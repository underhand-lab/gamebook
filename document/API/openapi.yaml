openapi: 3.0.3
info:
  title: gamelog API
  version: 0.1.0
  description: MVP API contract for gamelog frontend mock adapter and Spring Boot backend.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Catalog
  - name: Matches
  - name: Logs
  - name: Reviews
  - name: MVP
  - name: Tags
  - name: Calendar
  - name: Users
paths:
  /auth/signup:
    post:
      tags: [Auth]
      security: []
      summary: Sign up
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me:
    get:
      tags: [Auth]
      summary: Get current user
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/profile:
    patch:
      tags: [Auth]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/favorite-teams:
    get:
      tags: [Auth]
      summary: List current user's favorite teams
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FavoriteTeam'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Auth]
      summary: Replace current user's favorite teams
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFavoriteTeamsRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FavoriteTeam'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /sports:
    get:
      tags: [Catalog]
      security: []
      summary: List sports
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Sport'
  /leagues:
    get:
      tags: [Catalog]
      security: []
      summary: List leagues
      parameters:
        - $ref: '#/components/parameters/SportId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/League'
  /teams:
    get:
      tags: [Catalog]
      security: []
      summary: List teams
      parameters:
        - $ref: '#/components/parameters/SportId'
        - $ref: '#/components/parameters/LeagueId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Team'
  /matches:
    get:
      tags: [Matches]
      security: []
      summary: Search matches
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/SportId'
        - $ref: '#/components/parameters/LeagueId'
        - name: teamId
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchPage'
  /games/date/{date}:
    get:
      tags: [Matches]
      security: []
      summary: List matches by date
      parameters:
        - $ref: '#/components/parameters/Date'
        - $ref: '#/components/parameters/SportId'
        - $ref: '#/components/parameters/LeagueId'
        - name: favoriteTeamId
          in: query
          schema:
            type: string
        - name: favoriteOnly
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DateMatchPage'
  /matches/{matchId}:
    get:
      tags: [Matches]
      security: []
      summary: Get match detail
      parameters:
        - $ref: '#/components/parameters/MatchId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /matches/{matchId}/aggregate:
    get:
      tags: [Matches]
      security: []
      summary: Get match aggregate
      parameters:
        - $ref: '#/components/parameters/MatchId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchAggregate'
  /matches/{matchId}/players:
    get:
      tags: [Matches]
      security: []
      summary: List match players
      parameters:
        - $ref: '#/components/parameters/MatchId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Player'
  /matches/{matchId}/logs:
    post:
      tags: [Logs]
      summary: Create match log
      parameters:
        - $ref: '#/components/parameters/MatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMatchLogRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchLog'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/logs:
    get:
      tags: [Logs]
      summary: List my match logs
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchLogPage'
  /me/timeline:
    get:
      tags: [Logs]
      summary: List my timeline
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchLogAggregatePage'
  /logs/{logId}:
    patch:
      tags: [Logs]
      summary: Update match log
      parameters:
        - $ref: '#/components/parameters/LogId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMatchLogRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchLog'
    delete:
      tags: [Logs]
      summary: Delete match log
      parameters:
        - $ref: '#/components/parameters/LogId'
      responses:
        '204':
          description: No Content
  /matches/{matchId}/reviews:
    get:
      tags: [Reviews]
      security: []
      summary: List match reviews
      parameters:
        - $ref: '#/components/parameters/MatchId'
        - name: fanPerspective
          in: query
          schema:
            $ref: '#/components/schemas/FanPerspective'
        - name: sort
          in: query
          schema:
            $ref: '#/components/schemas/ReviewSort'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewPage'
    post:
      tags: [Reviews]
      summary: Create review
      parameters:
        - $ref: '#/components/parameters/MatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
  /reviews/{reviewId}:
    patch:
      tags: [Reviews]
      summary: Update review
      parameters:
        - $ref: '#/components/parameters/ReviewId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReviewRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
    delete:
      tags: [Reviews]
      summary: Delete review
      parameters:
        - $ref: '#/components/parameters/ReviewId'
      responses:
        '204':
          description: No Content
  /reviews/{reviewId}/like:
    post:
      tags: [Reviews]
      summary: Like review
      parameters:
        - $ref: '#/components/parameters/ReviewId'
      responses:
        '204':
          description: No Content
    delete:
      tags: [Reviews]
      summary: Unlike review
      parameters:
        - $ref: '#/components/parameters/ReviewId'
      responses:
        '204':
          description: No Content
  /tags:
    get:
      tags: [Tags]
      security: []
      summary: Search tags
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: tagType
          in: query
          schema:
            $ref: '#/components/schemas/TagType'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagPage'
  /tags/{tagName}:
    get:
      tags: [Tags]
      security: []
      summary: Get tag detail
      parameters:
        - $ref: '#/components/parameters/TagName'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /tags/{tagName}/matches:
    get:
      tags: [Tags]
      security: []
      summary: List matches for tag
      parameters:
        - $ref: '#/components/parameters/TagName'
        - $ref: '#/components/parameters/SportId'
        - $ref: '#/components/parameters/LeagueId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchPage'
  /matches/{matchId}/mvp-vote:
    put:
      tags: [MVP]
      summary: Create or update MVP vote
      parameters:
        - $ref: '#/components/parameters/MatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertMvpVoteRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MvpVote'
    delete:
      tags: [MVP]
      summary: Delete my MVP vote
      parameters:
        - $ref: '#/components/parameters/MatchId'
      responses:
        '204':
          description: No Content
  /me/calendar:
    get:
      tags: [Calendar]
      summary: Get my calendar month summary
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarMonth'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/calendar/{date}:
    get:
      tags: [Calendar]
      summary: Get my diary entries by date
      parameters:
        - $ref: '#/components/parameters/Date'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarDiaryDay'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/{userId}:
    get:
      tags: [Users]
      security: []
      summary: Get public user profile
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
  /users/{userId}/reviews:
    get:
      tags: [Users]
      security: []
      summary: List user reviews
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewPage'
  /users/{userId}/timeline:
    get:
      tags: [Users]
      security: []
      summary: List public user timeline
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchLogAggregatePage'
  /users/{userId}/stats:
    get:
      tags: [Users]
      security: []
      summary: Get user stats
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserStats'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SportId:
      name: sportId
      in: query
      schema:
        type: string
    LeagueId:
      name: leagueId
      in: query
      schema:
        type: string
    MatchId:
      name: matchId
      in: path
      required: true
      schema:
        type: string
    LogId:
      name: logId
      in: path
      required: true
      schema:
        type: string
    ReviewId:
      name: reviewId
      in: path
      required: true
      schema:
        type: string
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
    TagName:
      name: tagName
      in: path
      required: true
      schema:
        type: string
    Date:
      name: date
      in: path
      required: true
      schema:
        type: string
        format: date
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    SignupRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        displayName:
          type: string
          minLength: 2
          maxLength: 40
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      required: [accessToken, user]
      properties:
        accessToken:
          type: string
        user:
          $ref: '#/components/schemas/UserDetail'
    UpdateProfileRequest:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: string
          nullable: true
        primaryTeamId:
          type: string
          nullable: true
    UpdateFavoriteTeamsRequest:
      type: object
      required: [teamIds]
      properties:
        teamIds:
          type: array
          items:
            type: string
    UserDetail:
      type: object
      required: [id, email, displayName]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        primaryTeam:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Team'
        favoriteTeams:
          type: array
          items:
            $ref: '#/components/schemas/FavoriteTeam'
    FavoriteTeam:
      type: object
      required: [id, userId, sport, league, team, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        sport:
          $ref: '#/components/schemas/Sport'
        league:
          $ref: '#/components/schemas/League'
        team:
          $ref: '#/components/schemas/Team'
        createdAt:
          type: string
          format: date-time
    Sport:
      type: object
      required: [id, name, slug]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
    League:
      type: object
      required: [id, sportId, name, slug]
      properties:
        id:
          type: string
        sportId:
          type: string
        name:
          type: string
        country:
          type: string
        slug:
          type: string
    Team:
      type: object
      required: [id, sportId, name, shortName, slug]
      properties:
        id:
          type: string
        sportId:
          type: string
        leagueId:
          type: string
        name:
          type: string
        shortName:
          type: string
        slug:
          type: string
    Player:
      type: object
      required: [id, sportId, name]
      properties:
        id:
          type: string
        sportId:
          type: string
        currentTeamId:
          type: string
        name:
          type: string
        slug:
          type: string
    Stadium:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        city:
          type: string
        country:
          type: string
        latitude:
          type: number
        longitude:
          type: number
    MatchStatus:
      type: string
      enum: [SCHEDULED, LIVE, FINAL, POSTPONED, CANCELED]
    WatchType:
      type: string
      enum: [IN_PERSON, LIVE, OTHER]
    FanPerspective:
      type: string
      enum: [HOME_FAN, AWAY_FAN, OTHER_TEAM_FAN, NEUTRAL_FAN]
    Emotion:
      type: string
      enum: [HAPPY, MOVED, TENSE, ANGRY, SHOCKED]
    TagType:
      type: string
      enum: [OFFICIAL, USER]
    ReviewSort:
      type: string
      enum: [LATEST, MOST_LIKED, RATING_HIGH, RATING_LOW]
    Score:
      type: object
      properties:
        home:
          type: integer
          nullable: true
        away:
          type: integer
          nullable: true
    MatchSummary:
      type: object
      required: [id, sport, league, homeTeam, awayTeam, matchDate, status]
      properties:
        id:
          type: string
        sport:
          $ref: '#/components/schemas/Sport'
        league:
          $ref: '#/components/schemas/League'
        homeTeam:
          $ref: '#/components/schemas/Team'
        awayTeam:
          $ref: '#/components/schemas/Team'
        matchDate:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/MatchStatus'
        score:
          $ref: '#/components/schemas/Score'
        averageRating:
          type: number
        reviewCount:
          type: integer
    MatchDetail:
      allOf:
        - $ref: '#/components/schemas/MatchSummary'
        - type: object
          properties:
            stadium:
              $ref: '#/components/schemas/Stadium'
            aggregate:
              $ref: '#/components/schemas/MatchAggregate'
    MatchAggregate:
      type: object
      properties:
        reviewCount:
          type: integer
        averageRating:
          type: number
        ratingByFanPerspective:
          type: array
          items:
            $ref: '#/components/schemas/FanRating'
        ratingDistribution:
          type: array
          items:
            $ref: '#/components/schemas/RatingBucket'
        ratingDistributionByFanPerspective:
          type: array
          items:
            $ref: '#/components/schemas/FanRatingDistribution'
        mvpLeaders:
          type: array
          items:
            $ref: '#/components/schemas/MvpLeader'
        emotionDistribution:
          type: array
          items:
            $ref: '#/components/schemas/EmotionCount'
        topTags:
          type: array
          items:
            $ref: '#/components/schemas/TagCount'
    FanRating:
      type: object
      required: [fanPerspective, averageRating, reviewCount]
      properties:
        fanPerspective:
          $ref: '#/components/schemas/FanPerspective'
        averageRating:
          type: number
        reviewCount:
          type: integer
    FanRatingDistribution:
      allOf:
        - $ref: '#/components/schemas/FanRating'
        - type: object
          required: [ratingDistribution]
          properties:
            ratingDistribution:
              type: array
              items:
                $ref: '#/components/schemas/RatingBucket'
            emotionDistribution:
              type: array
              items:
                $ref: '#/components/schemas/EmotionCount'
    RatingBucket:
      type: object
      required: [rating, count]
      properties:
        rating:
          type: number
          minimum: 1
          maximum: 5
          multipleOf: 0.5
        count:
          type: integer
        percentage:
          type: number
    MvpLeader:
      type: object
      required: [player, voteCount]
      properties:
        player:
          $ref: '#/components/schemas/Player'
        voteCount:
          type: integer
        percentage:
          type: number
    EmotionCount:
      type: object
      required: [emotion, count]
      properties:
        emotion:
          $ref: '#/components/schemas/Emotion'
        count:
          type: integer
    TagCount:
      type: object
      required: [tag, count]
      properties:
        tag:
          $ref: '#/components/schemas/Tag'
        count:
          type: integer
    Tag:
      type: object
      required: [id, name, tagType]
      properties:
        id:
          type: string
        name:
          type: string
        tagType:
          $ref: '#/components/schemas/TagType'
    TagSearchResult:
      type: object
      required: [tag, reviewCount, matchCount]
      properties:
        tag:
          $ref: '#/components/schemas/Tag'
        reviewCount:
          type: integer
        matchCount:
          type: integer
    TagDetail:
      type: object
      required: [tag, reviewCount, matchCount, topMatches]
      properties:
        tag:
          $ref: '#/components/schemas/Tag'
        reviewCount:
          type: integer
        matchCount:
          type: integer
        topMatches:
          type: array
          items:
            $ref: '#/components/schemas/MatchSummary'
    CreateMatchLogRequest:
      type: object
      required: [watchedAt, watchType, fanPerspective]
      properties:
        watchedAt:
          type: string
